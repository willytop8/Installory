name: Installory

options:
  bundleIdPrefix: app.installory
  deploymentTarget:
    macOS: "14.0"

# Local SPM package. The Installory/ subdirectory at repo root is the
# Swift package (contains Package.swift). project.yml lives at repo root.
packages:
  Installory:
    path: ./Installory

targets:
  Installory:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    bundleId: app.installory.mac
    info:
      path: App/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "6"
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      path: App/Installory.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.files.user-selected.read-only: true
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: Installory
        product: InstalloryCore
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: app.installory.mac
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
