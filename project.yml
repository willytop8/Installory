name: Installory

options:
  bundleIdPrefix: app.installory
  deploymentTarget:
    macOS: "14.0"

# Local SPM package. The Installory/ subdirectory at repo root is the
# Swift package (contains Package.swift). project.yml lives at repo root.
packages:
  Installory:
    path: ./Installory

targets:
  Installory:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    bundleId: app.installory.mac
    info:
      path: App/Info.plist
    entitlements:
      path: App/Installory.entitlements
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: Installory
        product: InstalloryCore
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
